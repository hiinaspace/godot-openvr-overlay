name: Build Release Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5

      - name: Install SCons
        shell: pwsh
        run: |
          python -m pip install scons==4.10.1
          scons --version

      - name: Fetch OpenVR SDK
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/ValveSoftware/openvr.git openvr

      - name: Build template_debug
        shell: pwsh
        run: |
          scons platform=windows arch=x86_64 target=template_debug OPENVR_DIR="$env:GITHUB_WORKSPACE\openvr"

      - name: Build template_release
        shell: pwsh
        run: |
          scons platform=windows arch=x86_64 target=template_release OPENVR_DIR="$env:GITHUB_WORKSPACE\openvr"

      - name: Remove build-only outputs
        shell: pwsh
        run: |
          Get-ChildItem project\addons\godot-openvr-overlay\bin\windows -Include *.exp,*.lib,*.pdb -File | Remove-Item -Force
          Remove-Item project\addons\godot-openvr-overlay\godot-openvr-overlay.gdextension.uid -Force -ErrorAction SilentlyContinue

      - name: Upload addon payload
        uses: actions/upload-artifact@v4
        with:
          name: addon-windows-x86_64
          path: project/addons/godot-openvr-overlay/

  package:
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release names
        run: |
          COMMIT_SHORT_SHA="$(git rev-parse --short ${{ github.sha }})"
          echo "COMMIT_SHORT_SHA=${COMMIT_SHORT_SHA}" >> $GITHUB_ENV
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "RELEASE_VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV
            echo "ZIP_NAME=godot-openvr-overlay-windows-x86_64-${GITHUB_REF_NAME}.zip" >> $GITHUB_ENV
          else
            echo "RELEASE_VERSION=${COMMIT_SHORT_SHA}" >> $GITHUB_ENV
            echo "ZIP_NAME=godot-openvr-overlay-windows-x86_64-${COMMIT_SHORT_SHA}.zip" >> $GITHUB_ENV
          fi

      - name: Download built addon payload
        uses: actions/download-artifact@v4
        with:
          name: addon-windows-x86_64
          path: artifacts/addon

      - name: Package release zip
        run: |
          mkdir -p addons
          cp -r artifacts/addon addons/godot-openvr-overlay
          find addons/godot-openvr-overlay -name '.gitkeep' -delete
          find addons/godot-openvr-overlay -name '*.exp' -delete
          find addons/godot-openvr-overlay -name '*.lib' -delete
          find addons/godot-openvr-overlay -name '*.pdb' -delete
          find addons/godot-openvr-overlay -name '*.uid' -delete
          mkdir -p godot-openvr-overlay
          mv addons godot-openvr-overlay/
          cp LICENSE.md godot-openvr-overlay/
          cp README.md godot-openvr-overlay/
          zip -r "${ZIP_NAME}" godot-openvr-overlay

      - name: Upload release zip
        uses: actions/upload-artifact@v4
        with:
          name: godot-openvr-overlay-windows-x86_64-${{ env.RELEASE_VERSION }}
          path: ${{ env.ZIP_NAME }}

      - name: Publish GitHub release
        if: github.ref_type == 'tag'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" "${ZIP_NAME}" --generate-notes --title "${GITHUB_REF_NAME}"
