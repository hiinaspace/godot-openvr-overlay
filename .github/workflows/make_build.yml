name: Build Release Package

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5

      - name: Install SCons
        shell: pwsh
        run: |
          python -m pip install scons==4.10.1
          scons --version

      - name: Fetch OpenVR SDK
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/ValveSoftware/openvr.git openvr

      - name: Build template_debug
        shell: pwsh
        run: |
          scons platform=windows arch=x86_64 target=template_debug OPENVR_DIR="$env:GITHUB_WORKSPACE\openvr"

      - name: Build template_release
        shell: pwsh
        run: |
          scons platform=windows arch=x86_64 target=template_release OPENVR_DIR="$env:GITHUB_WORKSPACE\openvr"

      - name: Remove build-only outputs
        shell: pwsh
        run: |
          Get-ChildItem project\bin\windows -Include *.exp,*.lib,*.pdb -File | Remove-Item -Force
          Remove-Item project\bin\godot-openvr-overlay.gdextension.uid -Force -ErrorAction SilentlyContinue

      - name: Upload project bin
        uses: actions/upload-artifact@v4
        with:
          name: project-bin-windows-x86_64
          path: project/bin/

  package:
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short git commit SHA
        run: |
          echo "COMMIT_SHORT_SHA=$(git rev-parse --short ${{ github.sha }})" >> $GITHUB_ENV

      - name: Download built bin payload
        uses: actions/download-artifact@v4
        with:
          name: project-bin-windows-x86_64
          path: artifacts/project-bin

      - name: Package release zip
        run: |
          mkdir -p godot-openvr-overlay/bin
          cp -r artifacts/project-bin/* godot-openvr-overlay/bin/
          find godot-openvr-overlay/bin -name '.gitkeep' -delete
          find godot-openvr-overlay/bin -name '*.exp' -delete
          find godot-openvr-overlay/bin -name '*.lib' -delete
          find godot-openvr-overlay/bin -name '*.pdb' -delete
          find godot-openvr-overlay/bin -name '*.uid' -delete
          cp project/actions.json godot-openvr-overlay/
          cp project/bindings_knuckles.json godot-openvr-overlay/
          cp LICENSE.md godot-openvr-overlay/
          cp README.md godot-openvr-overlay/
          zip -r "godot-openvr-overlay-windows-x86_64-${COMMIT_SHORT_SHA}.zip" godot-openvr-overlay

      - name: Upload release zip
        uses: actions/upload-artifact@v4
        with:
          name: godot-openvr-overlay-windows-x86_64-${{ env.COMMIT_SHORT_SHA }}
          path: godot-openvr-overlay-windows-x86_64-${{ env.COMMIT_SHORT_SHA }}.zip
